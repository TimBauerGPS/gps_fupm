[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  port = 8888
  targetPort = 5173
  autoLaunch = false

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["jose", "twilio", "resend"]

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions."albi-sync"]
  schedule = "0 8 * * *"

[functions."cleanup-pdfs"]
  schedule = "0 2 * * *"   # 2:00 AM UTC = 6 PM PT

[[redirects]]
  from = "/api/external/letter-types"
  to = "/.netlify/functions/external-letter-types"
  status = 200

[[redirects]]
  from = "/api/external/project-link"
  to = "/.netlify/functions/external-project-link"
  status = 200

[[redirects]]
  from = "/api/external/project-letters"
  to = "/.netlify/functions/external-project-letters"
  status = 200

[[redirects]]
  from = "/api/external/project-letter-status"
  to = "/.netlify/functions/external-project-letter-status"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/s/:slug"
  to = "/.netlify/functions/short-link?slug=:slug"
  status = 200

# SPA fallback — must come after all API/function routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
